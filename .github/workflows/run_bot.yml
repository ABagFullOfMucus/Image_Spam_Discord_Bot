name: check-and-spam

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install aiohttp playwright
          playwright install --with-deps chromium

      - run: python bot.py
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SEARCH_TAG: Satono+Diamond

      # NEW: Save the posted.txt log back to GitHub so it isn't lost
      - name: Save cache log
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f posted.txt ]; then
            git add posted.txt
            git commit -m "update posted.txt cache [skip ci]" || echo "No changes to commit"
            git push origin main || echo "No changes to push"
          fi

      - name: Upload debug html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug.html
      - run: python bot.py
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SEARCH_TAG: Hatsune+Miku
          PAGES_TO_SCRAPE: 5  # <-- Change this value whenever you want to dig deeper
