name: check-and-spam

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install aiohttp playwright
          playwright install --with-deps chromium

      - run: python bot.py
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          SEARCH_TAG: Satono+Diamond
          PAGES_TO_SCRAPE: 100

      # NEW: Save the posted.txt log back to GitHub so it isn't lost
     # Save both the logs and the current page progress tracker back to GitHub
      - name: Save cache log and page progress
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Stage tracking files if they exist
          [ -f posted.txt ] && git add posted.txt
          [ -f current_page.txt ] && git add current_page.txt
          
          # Commit and push changes
          git commit -m "sync logs and advance page tracker [skip ci]" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
      - name: Upload debug html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug.html
      
